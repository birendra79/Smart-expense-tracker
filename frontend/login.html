<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - SmartTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/api.js"></script>
</head>
<body class="bg-background text-textMain font-sans flex items-center justify-center min-h-screen p-4">

  <div class="bg-surface/80 backdrop-blur-md border border-white/10 shadow-xl rounded-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">
        SmartTracker
      </h1>
      <p class="text-textMuted mt-2">Welcome back! Please login.</p>
    </div>

    <div id="error-msg" class="hidden bg-danger/20 text-danger border border-danger/50 p-3 rounded-lg mb-6"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" id="email" class="w-full bg-background/50 border border-white/10 rounded-lg px-4 py-2 text-textMain focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" id="password" class="w-full bg-background/50 border border-white/10 rounded-lg px-4 py-2 text-textMain focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" required>
      </div>
      
      <button type="submit" id="submit-btn" class="w-full mt-6 bg-gradient-to-r from-primary to-secondary hover:opacity-90 text-white font-medium py-2 px-6 rounded-lg transition-all shadow-lg hover:shadow-primary/20">
        Login
      </button>
    </form>

    <p class="text-center mt-6 text-sm text-textMuted">
      Don't have an account? <a href="/register.html" class="text-primary hover:underline">Register</a>
    </p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      const btn = document.getElementById('submit-btn');
      
      btn.textContent = 'Logging in...';
      btn.disabled = true;
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('token', data.token);
          if (data.user && data.user.currency) localStorage.setItem('currency', data.user.currency);
          if (data.user && data.user.categories) localStorage.setItem('categories', data.user.categories.join(','));
          window.location.href = '/index.html';
        } else {
          throw new Error(data.msg || 'Login failed');
        }
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
